<!doctype html>
<html lang="hi">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1,viewport-fit=cover"
  >
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <title>AURA — स्थानीय बुद्धिमान सहायक तंत्र</title>

  <meta
    name="description"
    content="AURA एक स्थानीय, हिंदी-केंद्रित, स्मरण रखने वाला, सीखने वाला और तर्क करने वाला सहायक तंत्र है।"
  >
  <meta name="theme-color" content="#0f172a">
  <meta name="color-scheme" content="dark light">
  <meta name="robots" content="noindex,nofollow">

  <link rel="icon" href="./assets/icons/aura.ico">
  <link rel="stylesheet" href="./assets/css/aura-console.css">
</head>

<body>
  <a class="skip-link" href="#main-content">मुख्य सामग्री पर जाएँ</a>

  <div id="app">
    <header class="app-header" role="banner">
      <div class="brand">
        <h1>AURA <span class="version">v1.0</span></h1>
        <p class="subtitle">स्थानीय बुद्धिमान सहायक तंत्र</p>
      </div>

      <div class="system-status" aria-live="polite" aria-atomic="true">
        <span id="systemIndicator" class="status-dot offline" aria-hidden="true"></span>
        <span id="systemStatus">प्रारम्भ हो रहा है...</span>
      </div>
    </header>

    <section class="status-bar" role="status" aria-label="तंत्र स्थिति पट्टी">
      <div>
        परत<br>
        <strong id="engineStatus">अभी बंद</strong>
      </div>
      <div>
        आरम्भ<br>
        <strong id="bootTime">--</strong>
      </div>
      <div>
        आदेश<br>
        <strong id="commandCount">0</strong>
      </div>
      <div>
        स्मृति<br>
        <strong id="memoryStatus">सक्रिय नहीं</strong>
      </div>
    </section>

    <nav class="toolbar" role="navigation" aria-label="सहायक उपकरण पट्टी">
      <button id="executeButton" type="button" class="button-primary">चलाएँ</button>
      <button id="copyButton" type="button" class="button-secondary">प्रतिलिपि</button>
      <button id="clearButton" type="button" class="button-secondary">साफ़ करें</button>
      <button id="downloadButton" type="button" class="button-secondary">डाउनलोड</button>
    </nav>

    <main class="console-layout" id="main-content">
      <section class="command-panel" aria-label="आदेश इनपुट">
        <label for="commandInput">आदेश</label>
        <textarea
          id="commandInput"
          name="commandInput"
          placeholder="यहाँ आदेश लिखें..."
          autocomplete="off"
          spellcheck="false"
          aria-describedby="shortcutInfo characterCount"
        ></textarea>

        <div class="command-info">
          <span id="characterCount">अक्षर : 0</span>
          <span id="shortcutInfo">Ctrl + Enter = चलाएँ</span>
        </div>
      </section>

      <section class="output-panel" aria-label="आदेश परिणाम">
        <div class="output-header">
          <h2>परिणाम</h2>
          <span id="executionTime">तैयार</span>
        </div>

        <pre
          id="outputConsole"
          aria-live="polite"
          aria-atomic="true"
        >आदेश की प्रतीक्षा है...</pre>
      </section>
    </main>

    <div id="toastContainer" aria-live="polite" aria-atomic="true"></div>

    <div
      id="modalContainer"
      role="dialog"
      aria-modal="true"
      aria-hidden="true"
    ></div>

    <footer class="app-footer">
      <span>AURA स्थानीय सहायक तंत्र</span>
      <span id="buildVersion">निर्माण: 1.0.0</span>
    </footer>
  </div>

  <noscript>इस तंत्र को चलाने के लिए जावास्क्रिप्ट आवश्यक है।</noscript>

  <script type="module" src="./assets/js/aura-bootstrap.js"></script>

  <script type="module">
    /**
     * URL-driven diagnostics router.
     * No buttons, no per-file test pages, no extra per-module test script additions.
     */

    const params = new URLSearchParams(window.location.search);
    const mode = String(params.get("mode") ?? "").trim().toLowerCase();
    const testFlag = String(params.get("test") ?? "").trim().toLowerCase();
    const isTestMode =
      mode === "test" ||
      testFlag === "1" ||
      testFlag === "true" ||
      testFlag === "yes";

    if (!isTestMode) {
      // Normal application mode: do nothing.
    } else {
      document.documentElement.dataset.auraMode = "test";

      const output = document.getElementById("outputConsole");
      const systemStatus = document.getElementById("systemStatus");
      const systemIndicator = document.getElementById("systemIndicator");
      const executionTime = document.getElementById("executionTime");

      const setStatus = (text, online = false) => {
        if (systemStatus) systemStatus.textContent = text;
        if (systemIndicator) {
          systemIndicator.classList.toggle("online", Boolean(online));
          systemIndicator.classList.toggle("offline", !online);
        }
      };

      const render = (payload) => {
        const value = typeof payload === "string"
          ? payload
          : JSON.stringify(payload, null, 2);

        if (output) {
          output.textContent = value;
        }
      };

      const normalizeModulePath = (raw) => {
        const value = String(raw ?? "").trim();

        if (!value) {
          throw new Error("Module path is required.");
        }

        if (!value.startsWith("./assets/js/")) {
          throw new Error('Module path must start with "./assets/js/".');
        }

        if (
          value.includes("://") ||
          value.startsWith("//") ||
          value.includes("\\") ||
          value.includes("\0") ||
          !/^[./A-Za-z0-9_-]+\.js$/u.test(value)
        ) {
          throw new Error(`Invalid module path: ${value}`);
        }

        return value;
      };

      const normalizeGroupName = (raw) => {
        const value = String(raw ?? "").trim();

        if (!value) {
          throw new Error("Group name is required.");
        }

        if (!/^[a-z0-9][a-z0-9-]*$/u.test(value)) {
          throw new Error(`Invalid group name: ${value}`);
        }

        return value;
      };

      const normalizeModuleName = (raw) => {
        const value = String(raw ?? "").trim();

        if (!value) {
          throw new Error("Module name is required.");
        }

        if (!/^[a-z0-9][a-z0-9._-]*$/u.test(value)) {
          throw new Error(`Invalid module name: ${value}`);
        }

        return value;
      };

      const waitForAuraReady = async (timeoutMs = 15000) => {
        const ready = window.AURA?.ready ?? window.AURA?.boot?.();

        if (!ready) {
          throw new Error("AURA bootstrap is not available.");
        }

        const timeout = new Promise((_, reject) => {
          window.setTimeout(() => {
            reject(new Error(`AURA readiness timed out after ${timeoutMs} ms.`));
          }, timeoutMs);
        });

        return Promise.race([Promise.resolve(ready), timeout]);
      };

      const action = String(
        params.get("action") ??
        (params.has("module") ? "import" : "boot")
      ).trim().toLowerCase();

      const startedAt = performance.now();

      setStatus("परीक्षण मोड", false);

      const run = async () => {
        await waitForAuraReady();

        switch (action) {
          case "boot": {
            return {
              success: true,
              action: "boot",
              auraVersion: window.AURA?.version ?? null,
              auraState: window.AURA?.getState?.() ?? null
            };
          }

          case "state": {
            return {
              success: true,
              action: "state",
              auraState: window.AURA?.getState?.() ?? null,
              loaderState: window.AURA?.engineLoader?.getState?.() ?? null
            };
          }

          case "manifest": {
            return {
              success: true,
              action: "manifest",
              manifest: window.AURA?.engineLoader?.getManifest?.() ?? null
            };
          }

          case "import": {
            const modulePath = normalizeModulePath(
              params.get("module") ?? params.get("path")
            );

            const namespace = await import(modulePath);

            return {
              success: true,
              action: "import",
              module: modulePath,
              exports: Object.keys(namespace),
              hasDefault: Object.prototype.hasOwnProperty.call(namespace, "default"),
              defaultType: typeof namespace.default
            };
          }

          case "load-group": {
            const groupName = normalizeGroupName(params.get("group"));

            if (!window.AURA?.engineLoader?.loadGroup) {
              throw new Error("engineLoader is not available.");
            }

            const result = await window.AURA.engineLoader.loadGroup(groupName, {
              autoInitialize: String(params.get("autoInitialize") ?? "true") !== "false"
            });

            return {
              success: true,
              action: "load-group",
              groupName: result.groupName,
              modules: result.modules.map((item) => item.moduleName),
              failedModules: result.failedModules.map((item) => item.moduleName),
              durationMs: result.durationMs
            };
          }

          case "load-module": {
            const groupName = normalizeGroupName(params.get("group"));
            const moduleName = normalizeModuleName(
              params.get("moduleName") ?? params.get("module")
            );

            if (!window.AURA?.engineLoader?.loadModule) {
              throw new Error("engineLoader is not available.");
            }

            const namespace = await window.AURA.engineLoader.loadModule(groupName, moduleName, {
              autoInitialize: String(params.get("autoInitialize") ?? "true") !== "false"
            });

            return {
              success: true,
              action: "load-module",
              groupName,
              moduleName,
              exports: Object.keys(namespace ?? {}),
              hasDefault: Boolean(namespace && Object.prototype.hasOwnProperty.call(namespace, "default"))
            };
          }

          case "load-all": {
            if (!window.AURA?.engineLoader?.loadAll) {
              throw new Error("engineLoader is not available.");
            }

            const result = await window.AURA.engineLoader.loadAll({
              autoInitialize: String(params.get("autoInitialize") ?? "true") !== "false"
            });

            return {
              success: true,
              action: "load-all",
              groupCount: result.length,
              loadedModules: result.reduce((count, group) => count + group.modules.length, 0),
              failedModules: result.reduce((count, group) => count + group.failedModules.length, 0)
            };
          }

          default:
            throw new Error(`Unknown test action: ${action}`);
        }
      };

      run()
        .then((result) => {
          const elapsed = Number((performance.now() - startedAt).toFixed(2));

          render({
            ...result,
            timestamp: new Date().toISOString(),
            executionTimeMs: elapsed
          });

          if (executionTime) {
            executionTime.textContent = `${elapsed} ms`;
          }

          setStatus("परीक्षण सफल", true);
        })
        .catch((error) => {
          const elapsed = Number((performance.now() - startedAt).toFixed(2));

          render({
            success: false,
            action,
            error: error instanceof Error ? error.message : String(error),
            timestamp: new Date().toISOString(),
            executionTimeMs: elapsed
          });

          if (executionTime) {
            executionTime.textContent = `${elapsed} ms`;
          }

          setStatus("परीक्षण असफल", false);
        });
    }
  </script>
</body>
</html>
